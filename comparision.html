<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparison Page</title>
     <link rel="stylesheet" href="Assist/e.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>

     <div id="navbar"></div>
    <div class="container">
        <h1 class="text-center display-4 text-uppercase my-5">Compare Page</h1>

        <div class="row">

            <!-- CARD 1 -->
            <div class="col-lg-6 col-md-12 mb-4">
                <label class="text-white">Brand Select</label>
                <select id="brand1" onchange="Brand_One()" class="form-select mb-3">
                    <option selected>Select...</option>
                    <option value="Classic Sofa">Classic Sofa</option>
                    <option value="Modern Classic Sofa">Modern Classic Sofa</option>
                    <option value="Luxury Sofa">Luxury Sofa</option>
                    <option value="Designer Accent Sofa">Designer Accent Sofa</option>
                    <option value="Grand Sofa">Grand Sofa</option>
                </select>

                <div class="card">
                    <div class="card-body text-center">
                        <img src="Assist/image/Classic Card 03.webp" class="img-fluid mb-3" id="img1">
                        <h3 id="text1">null</h3>
                        <h5 id="text2">null</h5>
                        <p id="text3">null</p>
                    </div>
                </div>
            </div>

            <!-- CARD 2 -->
            <div class="col-lg-6 col-md-12 mb-4">
                <label class="text-white">Brand Select</label>
                <select id="brand2" onchange="Brand_two()" class="form-select mb-3">
                    <option selected>Select...</option>
                    <option value="Classic Sofa">Classic Sofa</option>
                    <option value="Modern Classic Sofa">Modern Classic Sofa</option>
                    <option value="Luxury Sofa">Luxury Sofa</option>
                    <option value="Designer Accent Sofa">Designer Accent Sofa</option>
                    <option value="Grand Sofa">Grand Sofa</option>
                </select>

                <div class="card">
                    <div class="card-body text-center">
                        <img src="Assist/image/grand 5.webp" class="img-fluid mb-3" id="img2">
                        <h3 id="text4">null</h3>
                        <h5 id="text5">null</h5>
                        <p id="text6">null</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const products = {
            ClassicSofa: {
                img: "images/sofa.jpg",
                title: "Classic Sofa",
                model: "05",
                desc: "Timeless design with rich and deep, comfortable seating"
            },
            Modern Classic Sofa: {
                img: "images/Modern Classic Sofa.jpg",
                title: "Classic Sofa",
                model: "06",
                desc: "Clean lines and soft tones for a bright.."
            },
            luxurySofa: {
                img: "images/Designer Accent Sofa.jpg",
                title: "luxury Sofa",
                model: "L-19",
                desc: "Crafted with premium detailing for timeless comfort and style"
            },
            luxurySofa: {
                img: "images/luxurysofa.jpg",
                title: "luxury Sofa",
                model: "L-20",
                desc: "luxury sofas designed to enhance your living space.."
            },
            GrandSofa: {
                img: "images/Grand.jpg",
                title: "Grand Sofa",
                model: "G-10",
                desc: "Discover our Grand Sofas collection designed for modern living & Experience unmatched comfort with elegant craftsmanship.."
            }
        };

        function updateCard(selectId, imgId, t1, t2, t3) {

            let selected = document.getElementById(selectId).value;
            let otherSelect = (selectId === "brand1") ? "brand2" : "brand1";
            let otherValue = document.getElementById(otherSelect).value;

            if (selected === otherValue && selected !== "Select...") {
                swal("Warning", "Same Product cannot be compared!", "warning");
                document.getElementById(selectId).selectedIndex = 0;
                return;
            }

            if (products[selected]) {
                document.getElementById(imgId).src = products[selected].img;
                document.getElementById(t1).innerHTML = products[selected].title;
                document.getElementById(t2).innerHTML = products[selected].model;
                document.getElementById(t3).innerHTML = products[selected].desc;
            } else {
                document.getElementById(imgId).src = "images/noimage.png";
                document.getElementById(t1).innerHTML = "null";
                document.getElementById(t2).innerHTML = "null";
                document.getElementById(t3).innerHTML = "null";
            }

        }

        function Brand_One() {
            updateCard("brand1", "img1", "text1", "text2", "text3");
        }

        function Brand_two() {
            updateCard("brand2", "img2", "text4", "text5", "text6");
        }
    </script>


<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

<script src="navbar.js"></script>
<script src="footer.js"></script>
</body>

</html>
